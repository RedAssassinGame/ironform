const manifestBlob = new Blob([JSON.stringify(manifestData)],{type:'application/json'});
const manifestUrl = URL.createObjectURL(manifestBlob);
document.getElementById('manifestLink').href = manifestUrl;

// Service Worker for offline
if('serviceWorker' in navigator){
  const swCode = `
    const CACHE = 'ironform-v1';
    const ASSETS = [self.location.pathname];
    self.addEventListener('install', e => { e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS))); self.skipWaiting(); });
    self.addEventListener('activate', e => { e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k))))); self.clients.claim(); });
    self.addEventListener('fetch', e => { e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).catch(()=>caches.match(e.request)))); });
  `;
  const swBlob = new Blob([swCode],{type:'application/javascript'});
  const swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}
</script>

                    <div style={{fontSize:9,color:"#F43F5E"}}>{g.current}</div>
                    <div style={{fontSize:9,color:tierColors[tier],marginTop:1}}>Target: {g.target}</div>
                  </div>
                </div>
              ))}
            </div>
          );
        })}
      </Card>

      {/* CALISTHENICS PROGRESSION */}
      <div style={{background:"rgba(52,211,153,0.04)",border:"1px solid rgba(52,211,153,0.15)",borderRadius:12,padding:"14px 16px",marginBottom:10}}>
        <SectionTitle color="#34D399">🤸 CALISTHENICS — HOW TO PROGRESS</SectionTitle>
        <div style={{fontSize:9,color:"#6B7280",marginBottom:10,lineHeight:1.6}}>Core rule: <span style={{color:"#F1F5F9"}}>never progress until you own the current variation.</span> Own = control, no strain, 1–2 reps in reserve.</div>
        {[
          {skill:"Muscle-up",color:"#22D3EE",steps:["Band chest-to-bar","Strict chest-to-bar (sternum)","Band MU","Strict MU dead hang","Weighted MU"],rule:"5 clean reps with 2 in reserve"},
          {skill:"L-sit → Front Lever",color:"#34D399",steps:["Shoulder depression hold","Tuck L-sit 10s","One leg extend","Full L-sit 15s+","Tuck front lever 5s","Adv tuck FL","One leg FL","Full front lever"],rule:"Hold 8–10s comfortably"},
          {skill:"Back Lever",color:"#A78BFA",steps:["Inverted hang","Skin the cat","Tuck back lever 5s","Adv tuck 5s","One leg extended","Half-lay","Full back lever"],rule:"8–10s hold no visible strain"},
          {skill:"Handstand",color:"#FBBF24",steps:["Chest-to-wall 30s","Heel-to-wall 30s","Kick-up attempts","Freestanding 2–3s","Freestanding 5s","Freestanding 10s+"],rule:"Consistent across 3+ attempts"},
          {skill:"Human Flag",color:"#F97316",steps:["Tuck flag 3s","Tuck flag 5s","One leg extend 3s","Straddle flag","Full flag"],rule:"5s clean hold, controlled entry/exit"},
          {skill:"Dragon Flag",color:"#F43F5E",steps:["Tuck negatives 3s","Full negatives 5s","Eccentric only","Full reps"],rule:"5 clean reps of current variation"},
        ].map((s,i) => (
          <div key={i} style={{background:"#141414",borderLeft:`3px solid ${s.color}`,borderRadius:8,padding:"10px 12px",marginBottom:7}}>
            <div className="bebas" style={{fontSize:13,color:s.color,letterSpacing:1,marginBottom:5}}>{s.skill}</div>
            <div style={{display:"flex",gap:3,flexWrap:"wrap",marginBottom:5}}>
              {s.steps.map((step,j) => (
                <span key={j} style={{padding:"2px 6px",background:"#0E0E0E",border:"1px solid #2A2A2A",borderRadius:4,fontSize:8,color:"#9CA3AF"}}>{j+1}. {step}</span>
              ))}
            </div>
            <div style={{fontSize:8,color:s.color}}>↑ Progress when: {s.rule}</div>
          </div>
        ))}
      </div>

      {/* ATHLETIC GOALS */}
      <Card>
        <SectionTitle>ATHLETIC GOALS</SectionTitle>
        {ATHLETE.athleticGoals.map((g,i) => (
          <div key={i} style={{background:"#141414",border:"1px solid #1E1E1E",borderRadius:8,padding:"10px 12px",marginBottom:6,display:"flex",gap:10}}>
            <span style={{fontSize:20}}>{g.icon}</span>
            <div>
              <div style={{fontSize:12,color:"#F1F5F9",fontWeight:600}}>{g.label}</div>
              <div style={{fontSize:9,color:"#6B7280",marginTop:2,lineHeight:1.5}}>{g.note}</div>
            </div>
          </div>
        ))}
        <div style={{marginTop:8,padding:"10px 12px",background:"rgba(167,139,250,0.06)",border:"1px solid rgba(167,139,250,0.15)",borderRadius:8}}>
          <div style={{fontSize:8,letterSpacing:1,color:"#A78BFA",marginBottom:6}}>KNUCKLE CONDITIONING TIMELINE</div>
          <div style={{fontSize:9,color:"#6B7280",lineHeight:1.8}}>
            <span style={{color:"#4ADE80"}}>Wk 1–4:</span> Carpet. Holds then reps. Skin toughening.<br/>
            <span style={{color:"#FBBF24"}}>Wk 4–8:</span> Hardwood. Reps. Knuckles callusing.<br/>
            <span style={{color:"#F97316"}}>Wk 8–12:</span> Tile. Pain minimal. Increasing reps.<br/>
            <span style={{color:"#F43F5E"}}>Wk 12+:</span> Concrete. Full adaptation. The pain now is just unconditioned skin — not structural damage.
          </div>
        </div>
      </Card>

      {/* NUTRITION */}
      <div style={{background:"rgba(34,211,238,0.04)",border:"1px solid rgba(34,211,238,0.15)",borderRadius:12,padding:"14px 16px",marginBottom:10}}>
        <SectionTitle color="#22D3EE">⚡ NUTRITION (DEFICIT)</SectionTitle>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginBottom:12}}>
          {ATHLETE.nutrition.map((n,i) => (
            <div key={i} style={{background:"#0A0A0A",border:"1px solid #1A1A1A",borderRadius:7,padding:"8px",textAlign:"center"}}>
              <div style={{fontSize:7,letterSpacing:1,color:"#4B5563"}}>{n.label}</div>
              <div className="bebas" style={{fontSize:13,color:"#22D3EE",marginTop:2}}>{n.value}</div>
            </div>
          ))}
        </div>

        <div style={{fontSize:8,letterSpacing:1,color:"#22D3EE",marginBottom:8}}>CALORIES PER WEEK TYPE</div>
        {[
          ["W1 HYPERTROPHY","#4ADE80",[["MON","D1","2700"],["TUE","D2","2700"],["WED","D3","2800"],["THU","REST","2000"],["FRI","D4","2600"],["SAT","D5","2600"],["SUN","REST","2000"]],"Full deficit."],
          ["W2 STRENGTH","#FBBF24",[["MON","D1","2700"],["TUE","D2","2700"],["WED","D3","2800"],["THU","REST","2000"],["FRI","D4","2600"],["SAT","D5","2600"],["SUN","REST","2000"]],"Full deficit."],
          ["W3 CNS ADAPT","#F97316",[["MON","D1","2900"],["TUE","D2","2900"],["WED","D3","2950"],["THU","REST","2200"],["FRI","D4","2850"],["SAT","D5","2850"],["SUN","REST","2200"]],"Near maintenance. CNS needs fuel. Does NOT add fat."],
          ["W4 DELOAD","#60A5FA",[["MON","D1","2400"],["TUE","D2","2400"],["WED","D3","2400"],["THU","REST","1900"],["FRI","D4","2400"],["SAT","D5","2400"],["SUN","REST","1900"]],"Push deficit hardest — lowest training demand."],
          ["W5 PR TEST","#F43F5E",[["SUN","PRE-LOAD","2950"],["MON","BENCH PR","2950"],["TUE","DL PR","2950"],["WED","SQ PR","2950"],["THU","REST","2000"],["FRI","D4","2600"],["SAT","D5","2600"]],"Maintenance on PR days = glycogen loaded = better 1RM."],
        ].map(([title,col,days,note]) => (
          <div key={title} style={{marginBottom:10}}>
            <div className="bebas" style={{fontSize:11,color:col,letterSpacing:1,marginBottom:5}}>{title}</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
              {days.map(([d,s,c]) => (
                <div key={d} style={{background:"#141414",borderRadius:5,padding:"5px 2px",textAlign:"center",borderTop:`2px solid ${s==="REST"?"#1E1E1E":col}`}}>
                  <div className="bebas" style={{fontSize:9,color:s==="REST"?"#4B5563":col}}>{d}</div>
                  <div style={{fontSize:6,color:"#4B5563",margin:"1px 0"}}>{s}</div>
                  <div className="bebas" style={{fontSize:11,color:"#F1F5F9"}}>{c}</div>
                </div>
              ))}
            </div>
            <div style={{fontSize:8,color:"#4B5563",marginTop:3}}>{note}</div>
          </div>
        ))}

        <div style={{fontSize:9,color:"#6B7280",lineHeight:1.8,marginTop:4}}>
          <span style={{color:"#22D3EE"}}>Maintenance:</span> ~2,950 kcal/day (88kg/174cm/19yo/5 training days).<br/>
          <span style={{color:"#22D3EE"}}>Indian diet:</span> Dal+rice = complete protein+slow carbs. Chicken, paneer, eggs, curd. Curd before bed = casein.<br/>
          <span style={{color:"#22D3EE"}}>Creatine:</span> 5g/day. Non-negotiable in a deficit.<br/>
          <span style={{color:"#22D3EE"}}>Sleep:</span> 7.5–9hrs. Most anabolic tool you have.
        </div>
      </div>

      {/* HONEST EXPECTATIONS */}
      <Card>
        <SectionTitle>HONEST EXPECTATIONS + JULY AUDIT</SectionTitle>
        <div style={{background:"rgba(249,115,22,0.07)",border:"1px solid rgba(249,115,22,0.2)",borderRadius:8,padding:"10px 12px",marginBottom:10}}>
          <div style={{fontSize:8,letterSpacing:1,color:"#F97316",marginBottom:5}}>⚠️ JULY 4 — THE REAL MATHS</div>
          <div style={{fontSize:9,color:"#E5E7EB",lineHeight:1.8}}>
            <span style={{color:"#F97316"}}>Target:</span> 88kg/20% → ~80kg/12% in 15 weeks.<br/>
            <span style={{color:"#F97316"}}>Fat to lose:</span> ~8kg. At 0.5kg/wk = 7.5kg. At 0.6kg/wk = 9kg. <span style={{color:"#4ADE80"}}>✓ Achievable — zero room for consistent off-weeks.</span><br/>
            <span style={{color:"#F97316"}}>Indian body type:</span> Central fat (belly/chest) goes last. Arms + shoulders lean first (wk 6–10), abs at 13–14% (wk 10–14), Christmas tree at 12% (July).
          </div>
        </div>
        <div style={{fontSize:9,color:"#6B7280",lineHeight:1.9}}>
          <span style={{color:"#F1F5F9",fontWeight:600}}>Wk 1–5:</span> Scale drops 2–3kg. Bench past 110kg. Shoulder definition starts.<br/>
          <span style={{color:"#F1F5F9",fontWeight:600}}>Wk 6–10:</span> Lats widen visibly. Face leans out. Deadlift 230kg+. People notice.<br/>
          <span style={{color:"#F1F5F9",fontWeight:600}}>Wk 11–15:</span> Abs at 13–14%, clearly visible at 12%. Demon back + boulder shoulders. Bench 120kg+.<br/>
          <span style={{color:"#F1F5F9",fontWeight:600}}>Wk 16–20:</span> 10% BF. Bench 130–140kg, deadlift 240–250kg, squat 185–200kg.<br/>
          <span style={{color:"#F43F5E",fontWeight:600}}>What kills July goal:</span> Weekend overeating, skipping zone 2, underestimating calories.
        </div>
      </Card>

    </div>
  );
}

function ProgramPage() {
  const [day, setDay] = useState(0);
  const [week, setWeek] = useState(0);
  const d = PROGRAM.days[day];
  const wm = WEEKS_META[week];

  return (
    <div style={{padding:"14px 12px",maxWidth:600,margin:"0 auto"}}>

      {/* WEEK SELECTOR */}
      <div style={{marginBottom:14}}>
        <div style={{fontSize:8,letterSpacing:2,color:"#4B5563",marginBottom:6}}>SELECT WEEK</div>
        <div style={{display:"flex",gap:5}}>
          {WEEKS_META.map((wk,i) => {
            const active = week===i;
            return (
              <button key={i} className="wk-btn" onClick={()=>setWeek(i)} style={{
                flex:1,padding:"8px 2px",border:"none",borderRadius:7,
                background:active?wk.color:"#111",color:active?"#000":"#555",
                borderTop:`3px solid ${active?wk.color:"#222"}`,
                display:"flex",flexDirection:"column",alignItems:"center",gap:1,
              }}>
                <span className="bebas" style={{fontSize:18}}>{`W${i+1}`}</span>
                <span style={{fontSize:6,letterSpacing:0.5}}>{wk.label}</span>
              </button>
            );
          })}
        </div>
        <div style={{marginTop:6,background:"#0E0E0E",border:"1px solid #1A1A1A",borderRadius:7,padding:"8px 12px",display:"flex",gap:14,flexWrap:"wrap"}}>
          {[["FOCUS",wm.label],["RPE",wm.rpe],["SCHEME",wm.scheme],["VOLUME",wm.volume]].map(([l,v]) => (
            <div key={l}>
              <div style={{fontSize:7,letterSpacing:1,color:"#4B5563"}}>{l}</div>
              <div className="bebas" style={{fontSize:14,color:wm.color,letterSpacing:1}}>{v}</div>
            </div>
          ))}
        </div>
      </div>

      {/* DAY TABS */}
      <div style={{display:"flex",gap:5,marginBottom:12,overflowX:"auto",paddingBottom:2}}>
        {PROGRAM.days.map((dd,i) => {
          const active = day===i;
          return (
            <button key={dd.id} className="day-btn" onClick={()=>setDay(i)} style={{
              padding:"7px 10px",border:`1px solid ${active?"#F97316":"#1E1E1E"}`,
              borderRadius:7,background:active?"rgba(249,115,22,0.1)":"#0E0E0E",
              color:active?"#F97316":"#6B7280",whiteSpace:"nowrap",
              flexShrink:0,
            }}>
              <span className="bebas" style={{fontSize:12,letterSpacing:1}}>D{dd.id} · {dd.name}</span>
            </button>
          );
        })}
      </div>

      {/* DAY HEADER */}
      <div style={{background:"linear-gradient(135deg,#111,#161616)",border:"1px solid #1E1E1E",borderRadius:11,padding:"14px 14px",marginBottom:8}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:6,marginBottom:d.goalHits?10:0}}>
          <div>
            <div className="bebas" style={{fontSize:24,letterSpacing:2,color:"#F1F5F9",lineHeight:1}}>DAY {d.id}: {d.name}</div>
            <div style={{fontSize:10,color:"#9CA3AF",marginTop:3}}>{d.subtitle}</div>
          </div>
          <div style={{padding:"3px 10px",background:"#1A1A1A",border:"1px solid #2A2A2A",borderRadius:20,fontSize:7,letterSpacing:1,color:"#F97316"}}>{d.tag}</div>
        </div>
        {d.muscles && <div style={{fontSize:8,color:"#4B5563",marginBottom:6}}><span style={{color:"#333"}}>MUSCLES: </span>{d.muscles}</div>}
        {d.goalHits && <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
          {d.goalHits.map((g,i) => (
            <span key={i} style={{padding:"2px 8px",background:"rgba(249,115,22,0.08)",border:"1px solid rgba(249,115,22,0.2)",borderRadius:99,fontSize:8,color:"#F97316"}}>✓ {g}</span>
          ))}
        </div>}
      </div>

      {/* EXERCISES */}
      <div style={{display:"flex",flexDirection:"column",gap:7}}>
        {d.exercises.map((ex,idx) => {
          const wd = ex.weeks[week];
          const tm = TYPE_META[ex.type];
          return (
            <div key={idx} className="ex-card" style={{
              background:"#0E0E0E",border:"1px solid #1A1A1A",borderRadius:9,
              padding:"12px 13px",display:"grid",gridTemplateColumns:"1fr auto",alignItems:"start",gap:10,
            }}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4,flexWrap:"wrap"}}>
                  <span style={{padding:"2px 6px",background:tm.bg,color:tm.fg,borderRadius:4,fontSize:7,fontWeight:700,letterSpacing:1}}>{tm.label}</span>
                  <span style={{fontWeight:600,fontSize:13,color:"#F1F5F9"}}>{ex.name}</span>
                </div>
                <div style={{fontSize:10,color:"#6B7280",lineHeight:1.6}}>{wd.note}</div>
              </div>
              <div style={{textAlign:"center",minWidth:66}}>
                <div style={{background:"#161616",border:"1px solid #252525",borderRadius:7,padding:"7px 8px"}}>
                  <div className="bebas" style={{fontSize:18,color:wm.color,letterSpacing:1,lineHeight:1}}>{wd.sets}×{wd.reps}</div>
                  <div style={{fontSize:7,color:"#4B5563",letterSpacing:1,marginTop:1}}>SETS×REPS</div>
                </div>
              </div>
            </div>
          );
        })}
      </div>

      {/* LEGEND */}
      <div style={{marginTop:12,display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Card style={{margin:0}}>
          <SectionTitle>LEGEND</SectionTitle>
          {Object.entries(TYPE_META).map(([k,v]) => (
            <div key={k} style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
              <div style={{width:6,height:6,borderRadius:2,background:v.bg,flexShrink:0}}/>
              <span style={{fontSize:9,color:"#6B7280"}}>{v.label}</span>
            </div>
          ))}
        </Card>
        <Card style={{margin:0}}>
          <SectionTitle>BLOCK LOGIC</SectionTitle>
          <div style={{fontSize:9,color:"#6B7280",lineHeight:1.8}}>
            W1→W2: +2.5kg upper/+5kg lower<br/>
            W3: Same W2 loads, fewer sets<br/>
            W4: Drop to 60% — flush<br/>
            W5: Pyramid to new 1RM<br/>
            After W5: Reset, run heavier
          </div>
        </Card>
      </div>

      {/* SCHEDULE */}
      <Card style={{marginTop:8}}>
        <SectionTitle>WEEKLY SCHEDULE</SectionTitle>
        <div style={{display:"flex",gap:4}}>
          {[["MON","D1 PUSH"],["TUE","D2 PULL"],["WED","D3 LEGS"],["THU","REST"],["FRI","D4 SKILLS"],["SAT","D5 BACK"],["SUN","REST"]].map(([dy,s]) => (
            <div key={dy} style={{flex:1,textAlign:"center",padding:"6px 2px",background:"#141414",borderRadius:5,border:"1px solid #1E1E1E"}}>
              <div className="bebas" style={{fontSize:10,color:"#F97316",letterSpacing:1}}>{dy}</div>
              <div style={{fontSize:6,color:"#6B7280",marginTop:1}}>{s}</div>
            </div>
          ))}
        </div>
      </Card>

    </div>
  );
}

function App() {
  const [tab, setTab] = useState("profile");

  return (
    <div style={{fontFamily:"'Space Grotesk',sans-serif",background:"#080808",minHeight:"100vh",color:"#E5E7EB"}}>

      {/* HEADER */}
      <div style={{background:"#0C0C0C",borderBottom:"1px solid #1A1A1A",padding:"0 14px",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingTop:12,paddingBottom:8}}>
          <div>
            <div className="bebas" style={{fontSize:30,letterSpacing:4,color:"#F97316",lineHeight:1}}>IRONFORM</div>
            <div style={{fontSize:7,letterSpacing:2,color:"#4B5563",marginTop:1}}>AESTHETICS · POWERLIFTING · STREETLIFTING · CALISTHENICS</div>
          </div>
        </div>
        <div style={{display:"flex",gap:0,borderTop:"1px solid #1A1A1A"}}>
          {[["profile","🎯 PROFILE & GOALS"],["program","📋 PROGRAM"]].map(([t,label]) => (
            <button key={t} className="tab-btn" onClick={()=>setTab(t)} style={{
              padding:"9px 14px",background:"none",border:"none",
              borderBottom:tab===t?"2px solid #F97316":"2px solid transparent",
              color:tab===t?"#F97316":"#4B5563",
              fontSize:11,letterSpacing:1,marginBottom:-1,
            }}>
              <span className="bebas" style={{letterSpacing:1}}>{label}</span>
            </button>
          ))}
        </div>
      </div>

      {tab==="profile" && <ProfilePage/>}
      {tab==="program" && <ProgramPage/>}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

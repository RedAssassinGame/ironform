<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#080808"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="IRONFORM"/>
<title>IRONFORM</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--orange:#F97316;--red:#F43F5E;--green:#4ADE80;--yellow:#FBBF24;--blue:#60A5FA;--cyan:#22D3EE;--purple:#A78BFA;--teal:#34D399;--bg:#080808;--bg2:#0E0E0E;--bg3:#141414;--border:#1A1A1A;--border2:#2A2A2A;--text:#E5E7EB;--muted:#6B7280;--dim:#4B5563;--dark:#2A2A2A}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overscroll-behavior:none}
button{cursor:pointer;font-family:inherit;border:none;transition:all .15s;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:#111}::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
.bb{font-family:Impact,'Arial Black',sans-serif;letter-spacing:1px}

/* LOCK */
#lock{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px}
#lock.gone{display:none}
#pw-title{font-family:Impact,'Arial Black',sans-serif;font-size:48px;letter-spacing:6px;color:var(--orange);line-height:1;margin-bottom:4px}
#pw-sub{font-size:9px;letter-spacing:3px;color:var(--dim);margin-bottom:44px}
#pw{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-family:inherit;font-size:20px;letter-spacing:6px;padding:14px 20px;text-align:center;width:100%;max-width:280px;outline:none;margin-bottom:12px}
#pw:focus{border-color:var(--orange)}
#pwbtn{background:var(--orange);border-radius:10px;color:#000;font-family:Impact,'Arial Black',sans-serif;font-size:22px;letter-spacing:3px;padding:13px;width:100%;max-width:280px}
#pwerr{color:var(--red);font-size:11px;letter-spacing:1px;margin-top:6px;min-height:16px;text-align:center}

/* LAYOUT */
#app{display:none}
#app.show{display:block}
#header{background:#0C0C0C;border-bottom:1px solid var(--border);padding:0 14px;position:sticky;top:0;z-index:100}
#header-top{display:flex;justify-content:space-between;align-items:center;padding:12px 0 8px}
#logo{font-family:Impact,'Arial Black',sans-serif;font-size:32px;letter-spacing:5px;color:var(--orange);line-height:1}
#logo-sub{font-size:7px;letter-spacing:2px;color:var(--dim);margin-top:2px}
#tabs{display:flex;border-top:1px solid var(--border)}
.tab-btn{padding:9px 14px;background:none;color:var(--dim);font-size:11px;letter-spacing:1px;border-bottom:2px solid transparent;margin-bottom:-1px;font-family:Impact,'Arial Black',sans-serif}
.tab-btn.active{color:var(--orange);border-bottom-color:var(--orange)}
#content{padding:14px 12px;max-width:560px;margin:0 auto}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.card-cyan{background:rgba(34,211,238,0.04);border:1px solid rgba(34,211,238,0.15)}
.card-green{background:rgba(52,211,153,0.04);border:1px solid rgba(52,211,153,0.15)}
.section-title{font-size:9px;letter-spacing:2px;color:var(--dim);margin-bottom:8px}

/* HERO */
#hero{background:linear-gradient(135deg,#111,#0E0E0E,#161616);border:1px solid #1E1E1E;border-radius:14px;padding:18px 16px;margin-bottom:10px;position:relative;overflow:hidden}
#hero::after{content:'';position:absolute;top:-20px;right:-20px;width:150px;height:150px;border-radius:50%;background:radial-gradient(circle,rgba(249,115,22,.08),transparent 70%);pointer-events:none}
.countdown-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.countdown-box{border-radius:10px;padding:12px 8px;text-align:center}
.countdown-num{font-family:Impact,'Arial Black',sans-serif;font-size:44px;line-height:1}
.countdown-label{font-size:8px;letter-spacing:1px;margin-top:2px}
.countdown-sub{font-size:7px;color:var(--dim);margin-top:1px}
.progress-bar-wrap{margin-bottom:10px}
.progress-labels{display:flex;justify-content:space-between;margin-bottom:4px;font-size:7px;color:var(--dim)}
.progress-track{background:#1A1A1A;border-radius:99px;height:7px;overflow:hidden}
.progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--green),var(--yellow),var(--orange))}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:7px 4px;text-align:center}
.stat-label{font-size:7px;color:var(--dim)}
.stat-val{font-family:Impact,'Arial Black',sans-serif;font-size:14px;color:var(--text);margin-top:1px}

/* LIFTS */
.lift-row{margin-bottom:12px}
.lift-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
.lift-name{font-family:Impact,'Arial Black',sans-serif;font-size:12px;letter-spacing:1px}
.lift-cur{font-family:Impact,'Arial Black',sans-serif;font-size:20px;color:var(--text)}
.lift-goal{font-family:Impact,'Arial Black',sans-serif;font-size:20px}
.lift-pct{font-size:7px;color:var(--dim);text-align:right;margin-top:2px}

/* BLOCKS */
.block-row{border-radius:8px;padding:10px 12px;margin-bottom:6px}
.block-name{font-family:Impact,'Arial Black',sans-serif;font-size:14px;letter-spacing:1px}
.block-focus{font-size:10px;color:var(--text);font-weight:600}
.block-label{font-size:8px;color:var(--dim);margin-top:1px}

/* MILESTONES */
.milestone-row{background:var(--bg3);border-radius:7px;padding:8px 10px;margin-bottom:5px;display:flex;gap:10px;align-items:center}
.milestone-icon{font-size:18px;flex-shrink:0}
.milestone-label{font-size:10px;color:var(--text);font-weight:600}
.milestone-target{font-size:8px;margin-top:1px}

/* GOAL CHIPS */
.goal-chip{display:flex;gap:8px;align-items:flex-start;border-radius:7px;padding:8px 10px;margin-bottom:4px}
.goal-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:3px}
.goal-text{font-size:10px}

/* CALISTHENICS TIER */
.tier-item{border-left:3px solid;border-radius:7px;padding:8px 10px;margin-bottom:4px;display:flex;gap:10px}

/* SKILL PROG */
.skill-prog{border-left:3px solid;border-radius:8px;padding:10px 12px;margin-bottom:7px}
.skill-name{font-family:Impact,'Arial Black',sans-serif;font-size:13px;letter-spacing:1px;margin-bottom:5px}
.skill-steps{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:5px}
.skill-step{padding:2px 6px;background:var(--bg);border:1px solid var(--border2);border-radius:4px;font-size:8px;color:#9CA3AF}
.skill-rule{font-size:8px}

/* NUTRITION */
.nut-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:14px}
.nut-box{background:#0A0A0A;border:1px solid var(--border);border-radius:7px;padding:8px 6px;text-align:center}
.nut-label{font-size:7px;color:var(--dim)}
.nut-val{font-family:Impact,'Arial Black',sans-serif;font-size:12px;color:var(--cyan);margin-top:2px}
.cal-week{margin-bottom:12px}
.cal-title{font-family:Impact,'Arial Black',sans-serif;font-size:11px;letter-spacing:1px;margin-bottom:5px}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day{background:var(--bg3);border-radius:5px;padding:5px 2px;text-align:center}
.cal-d{font-family:Impact,'Arial Black',sans-serif;font-size:9px}
.cal-s{font-size:6px;color:var(--dim);margin:1px 0}
.cal-c{font-family:Impact,'Arial Black',sans-serif;font-size:11px;color:var(--text)}

/* PROGRAM */
.week-selector{margin-bottom:14px}
.week-btns{display:flex;gap:5px;margin-bottom:6px}
.week-btn{flex:1;padding:8px 2px;border-radius:7px;display:flex;flex-direction:column;align-items:center;gap:1px;border-top:3px solid}
.week-btn-num{font-family:Impact,'Arial Black',sans-serif;font-size:18px}
.week-btn-label{font-size:6px;letter-spacing:0.5px}
.week-meta{background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:8px 12px;display:flex;gap:12px;flex-wrap:wrap}
.week-meta-item .wm-label{font-size:7px;color:var(--dim)}
.week-meta-item .wm-val{font-family:Impact,'Arial Black',sans-serif;font-size:14px;letter-spacing:1px}
.day-tabs{display:flex;gap:5px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px}
.day-tab{padding:7px 10px;border:1px solid var(--border);border-radius:7px;background:var(--bg2);color:var(--muted);white-space:nowrap;flex-shrink:0;font-family:Impact,'Arial Black',sans-serif;font-size:12px;letter-spacing:1px}
.day-tab.active{border-color:var(--orange);background:rgba(249,115,22,0.1);color:var(--orange)}
.day-header{background:linear-gradient(135deg,#111,#161616);border:1px solid #1E1E1E;border-radius:11px;padding:14px;margin-bottom:8px}
.day-name{font-family:Impact,'Arial Black',sans-serif;font-size:22px;letter-spacing:2px;color:var(--text);line-height:1}
.day-sub{font-size:10px;color:#9CA3AF;margin-top:3px}
.day-tag{padding:3px 8px;background:var(--bg3);border:1px solid var(--border2);border-radius:20px;font-size:7px;letter-spacing:1px;color:var(--orange);flex-shrink:0}
.day-muscles{font-size:8px;color:var(--dim);margin-bottom:6px}
.day-goals{display:flex;flex-wrap:wrap;gap:4px}
.day-goal-chip{padding:2px 8px;background:rgba(249,115,22,0.08);border:1px solid rgba(249,115,22,0.2);border-radius:99px;font-size:8px;color:var(--orange)}
.ex-card{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:12px 13px;display:grid;grid-template-columns:1fr auto;gap:10px;align-items:start;margin-bottom:7px}
.ex-type{padding:2px 6px;border-radius:4px;font-size:7px;font-weight:700;letter-spacing:1px;display:inline-block;margin-bottom:4px}
.ex-name{font-weight:600;font-size:13px;color:var(--text);margin-left:6px}
.ex-note{font-size:10px;color:var(--muted);line-height:1.6;margin-top:4px}
.sets-box{background:#161616;border:1px solid #252525;border-radius:7px;padding:7px 8px;text-align:center;min-width:64px}
.sets-num{font-family:Impact,'Arial Black',sans-serif;font-size:17px;line-height:1;letter-spacing:1px}
.sets-label{font-size:7px;color:var(--dim);letter-spacing:1px;margin-top:1px}
.legend-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.legend-item{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.legend-dot{width:6px;height:6px;border-radius:2px;flex-shrink:0}
.sched{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-top:8px}
.sched-days{display:flex;gap:4px;margin-top:7px}
.sched-day{flex:1;text-align:center;padding:6px 2px;background:var(--bg3);border-radius:5px;border:1px solid var(--border)}
.sched-d{font-family:Impact,'Arial Black',sans-serif;font-size:10px;color:var(--orange);letter-spacing:1px}
.sched-s{font-size:6px;color:var(--muted);margin-top:1px}
</style>
</head>
<body>

<div id="lock">
  <div id="pw-title">IRONFORM</div>
  <div id="pw-sub">YOUR TRAINING SYSTEM</div>
  <input id="pw" type="password" placeholder="PASSWORD" autocomplete="off"/>
  <button id="pwbtn">UNLOCK</button>
  <div id="pwerr"></div>
</div>

<div id="app">
  <div id="header">
    <div id="header-top">
      <div>
        <div id="logo">IRONFORM</div>
        <div id="logo-sub">AESTHETICS · POWERLIFTING · STREETLIFTING · CALISTHENICS</div>
      </div>
    </div>
    <div id="tabs">
      <button class="tab-btn active" onclick="showTab('profile')">🎯 PROFILE &amp; GOALS</button>
      <button class="tab-btn" onclick="showTab('program')">📋 PROGRAM</button>
    </div>
  </div>
  <div id="content"></div>
</div>

// PASSWORD
(function(){
  var PW='Raiuga';
  function check(){
    var v=document.getElementById('pw').value;
    if(v===PW){
      document.getElementById('lock').classList.add('gone');
      document.getElementById('app').classList.add('show');
      try{sessionStorage.setItem('if','1')}catch(e){}
      init();
    } else {
      document.getElementById('pwerr').textContent='INCORRECT PASSWORD';
      document.getElementById('pw').value='';
    }
  }
  document.getElementById('pwbtn').addEventListener('click',check);
  document.getElementById('pw').addEventListener('keydown',function(e){if(e.key==='Enter')check()});
  try{
    if(sessionStorage.getItem('if')==='1'){
      document.getElementById('lock').classList.add('gone');
      document.getElementById('app').classList.add('show');
      document.addEventListener('DOMContentLoaded',init);
    }
  }catch(e){}
})();

function h(tag,attrs,children){
  var el=document.createElement(tag);
  if(attrs)Object.keys(attrs).forEach(function(k){
    if(k==='style'&&typeof attrs[k]==='object'){Object.assign(el.style,attrs[k]);}
    else if(k==='className'){el.className=attrs[k];}
    else{el.setAttribute(k,attrs[k]);}
  });
  if(children){
    (Array.isArray(children)?children:[children]).forEach(function(c){
      if(c==null||c===false)return;
      if(typeof c==='string'||typeof c==='number'){el.appendChild(document.createTextNode(c));}
      else{el.appendChild(c);}
    });
  }
  return el;
}

function card(cls,children){
  var d=document.createElement('div');
  d.className='card'+(cls?' '+cls:'');
  if(Array.isArray(children))children.forEach(function(c){if(c)d.appendChild(c)});
  else if(children)d.appendChild(children);
  return d;
}

function sectionTitle(text,color){
  var d=document.createElement('div');
  d.className='section-title';
  if(color)d.style.color=color;
  d.textContent=text;
  return d;
}

function progressBar(pct,color){
  var track=h('div',{className:'progress-track'});
  var fill=h('div',{className:'progress-fill',style:{width:pct+'%',background:color||'linear-gradient(90deg,#4ADE80,#FBBF24,#F97316)'}});
  track.appendChild(fill);
  return track;
}

    var note=document.createElement('div');note.className='ex-note';note.textContent=wd.note;left.appendChild(note);
    var right=document.createElement('div');
    var sb=document.createElement('div');sb.className='sets-box';
    var sn=document.createElement('div');sn.className='sets-num';sn.style.color=wm.c;sn.textContent=wd.s+'×'+wd.r;
    var sl=document.createElement('div');sl.className='sets-label';sl.textContent='SETS×REPS';
    sb.appendChild(sn);sb.appendChild(sl);right.appendChild(sb);
    card2.appendChild(left);card2.appendChild(right);
    exWrap.appendChild(card2);
  });
  frag.appendChild(exWrap);

  // LEGEND + BLOCK LOGIC
  var lgrid=document.createElement('div');lgrid.className='legend-grid';
  var lcard=document.createElement('div');lcard.className='card';lcard.style.margin='0';
  lcard.appendChild(sectionTitle('LEGEND'));
  Object.keys(TM).forEach(function(k){
    var v=TM[k];
    lcard.innerHTML+='<div class="legend-item"><div class="legend-dot" style="background:'+v.bg+'"></div><span style="font-size:9px;color:#6B7280">'+v.label+'</span></div>';
  });
  var bcard=document.createElement('div');bcard.className='card';bcard.style.margin='0';
  bcard.appendChild(sectionTitle('BLOCK LOGIC'));
  bcard.innerHTML+='<div style="font-size:9px;color:#6B7280;line-height:1.9">W1→W2: +2.5kg upper/+5kg lower<br>W3: Same W2 loads, fewer sets<br>W4: Drop to 60% — flush<br>W5: Pyramid to new 1RM<br>After W5: Reset, run heavier</div>';
  lgrid.appendChild(lcard);lgrid.appendChild(bcard);
  frag.appendChild(lgrid);

  // SCHEDULE
  var sched=document.createElement('div');sched.className='sched';
  sched.appendChild(sectionTitle('WEEKLY SCHEDULE'));
  var sd=document.createElement('div');sd.className='sched-days';
  [['MON','D1 PUSH'],['TUE','D2 PULL'],['WED','D3 LEGS'],['THU','REST'],['FRI','D4 SKILLS'],['SAT','D5 AESTHETICS'],['SUN','REST']].forEach(function(x){
    sd.innerHTML+='<div class="sched-day"><div class="sched-d">'+x[0]+'</div><div class="sched-s">'+x[1]+'</div></div>';
  });
  sched.appendChild(sd);
  frag.appendChild(sched);

  return frag;
}

function refreshProgram(){
  var content=document.getElementById('content');
  content.innerHTML='';
  content.appendChild(renderProgram());
}

function showTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active')});
  document.querySelectorAll('.tab-btn')[tab==='profile'?0:1].classList.add('active');
  var content=document.getElementById('content');
  content.innerHTML='';
  if(tab==='profile'){content.appendChild(renderProfile());}
  else{content.appendChild(renderProgram());}
}

function init(){
  showTab('profile');
}
</script>

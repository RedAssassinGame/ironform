*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Space Grotesk',sans-serif;background:#080808;color:#E5E7EB;min-height:100vh;overscroll-behavior:none}
button{cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:all .15s}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:#111}::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
.bb{font-family:'Bebas Neue',cursive}
#lock{position:fixed;inset:0;background:#080808;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px}
#lock.gone{display:none}
#pw{background:#141414;border:1px solid #2A2A2A;border-radius:10px;color:#F1F5F9;font-family:'Space Grotesk',sans-serif;font-size:20px;letter-spacing:6px;padding:14px 20px;text-align:center;width:100%;max-width:280px;outline:none;margin-bottom:12px}
#pw:focus{border-color:#F97316}
#pwbtn{background:#F97316;border:none;border-radius:10px;color:#000;font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:3px;padding:13px;width:100%;max-width:280px}
#pwerr{color:#F43F5E;font-size:11px;letter-spacing:1px;margin-top:6px;min-height:16px;text-align:center}
</style>

<body>

<div id="lock">
  <div class="bb" style="font-size:44px;letter-spacing:6px;color:#F97316;line-height:1;margin-bottom:4px">IRONFORM</div>
  <div style="font-size:9px;letter-spacing:3px;color:#4B5563;margin-bottom:44px">YOUR TRAINING SYSTEM</div>
  <input id="pw" type="password" placeholder="PASSWORD" autocomplete="off"/>
  <button id="pwbtn">UNLOCK</button>
  <div id="pwerr"></div>
</div>

<div id="app"></div>

<script>
(function(){
  var PW = 'Raiuga';
  function check(){
    var v = document.getElementById('pw').value;
    if(v === PW){
      document.getElementById('lock').classList.add('gone');
      try{sessionStorage.setItem('if','1')}catch(e){}
    } else {
      document.getElementById('pwerr').textContent = 'INCORRECT PASSWORD';
      document.getElementById('pw').value = '';
    }
  }
  document.getElementById('pwbtn').addEventListener('click', check);
  document.getElementById('pw').addEventListener('keydown', function(e){ if(e.key==='Enter') check(); });
  try{ if(sessionStorage.getItem('if')==='1') document.getElementById('lock').classList.add('gone'); }catch(e){}
})();
</script>

                <div style={{fontSize:10,color:"#E5E7EB",fontWeight:600}}>{g.label}</div>
                <div style={{fontSize:8,color:"#F43F5E"}}>{g.cur}</div>
                <div style={{fontSize:8,color:tc[tier],marginTop:1}}>Target: {g.tgt}</div>
              </div>
            </div>
          ))}
        </div>;
      })}
    </div>

    {/* CALISTHENICS PROGRESSION */}
    <div style={{background:"rgba(52,211,153,0.04)",border:"1px solid rgba(52,211,153,0.15)",borderRadius:12,padding:"14px",marginBottom:10}}>
      <div style={{fontSize:9,letterSpacing:2,color:"#34D399",marginBottom:8}}>🤸 HOW TO PROGRESS — CALISTHENICS</div>
      <div style={{fontSize:9,color:"#6B7280",marginBottom:10,lineHeight:1.6}}>Core rule: <span style={{color:"#F1F5F9"}}>never progress until you own current variation.</span> Own = control, no strain, 1–2 reps in reserve.</div>
      {CPROG.map((s,i)=>(
        <div key={i} style={{background:"#141414",borderLeft:`3px solid ${s.c}`,borderRadius:8,padding:"10px 12px",marginBottom:7}}>
          <div className="bb" style={{fontSize:13,color:s.c,letterSpacing:1,marginBottom:5}}>{s.skill}</div>
          <div style={{display:"flex",gap:3,flexWrap:"wrap",marginBottom:5}}>
            {s.steps.map((step,j)=>(
              <span key={j} style={{padding:"2px 6px",background:"#0E0E0E",border:"1px solid #2A2A2A",borderRadius:4,fontSize:8,color:"#9CA3AF"}}>{j+1}. {step}</span>
            ))}
          </div>
          <div style={{fontSize:8,color:s.c}}>↑ Progress when: {s.rule}</div>
        </div>
      ))}
    </div>

    {/* NUTRITION */}
    <div style={{background:"rgba(34,211,238,0.04)",border:"1px solid rgba(34,211,238,0.15)",borderRadius:12,padding:"14px",marginBottom:10}}>
      <div style={{fontSize:9,letterSpacing:2,color:"#22D3EE",marginBottom:10}}>⚡ NUTRITION (DEFICIT)</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginBottom:14}}>
        {[["Maintenance","~2,950 kcal"],["Protein","176–194g/day"],["Weekly Loss","0.4–0.6 kg/wk"],["Calories","2,400–2,600"],["Carbs","220–270g/day"],["Fats","60–80g/day"]].map(([l,v])=>(
          <div key={l} style={{background:"#0A0A0A",border:"1px solid #1A1A1A",borderRadius:7,padding:"8px 6px",textAlign:"center"}}>
            <div style={{fontSize:7,color:"#4B5563"}}>{l}</div>
            <div className="bb" style={{fontSize:12,color:"#22D3EE",marginTop:2}}>{v}</div>
          </div>
        ))}
      </div>
      <div style={{fontSize:8,letterSpacing:1,color:"#22D3EE",marginBottom:8}}>CALORIES PER WEEK TYPE</div>
      {CALS.map(([title,col,days,note])=>(
        <div key={title} style={{marginBottom:12}}>
          <div className="bb" style={{fontSize:11,color:col,letterSpacing:1,marginBottom:5}}>{title}</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
            {days.map(([d,s,c])=>(
              <div key={d} style={{background:"#141414",borderRadius:5,padding:"5px 2px",textAlign:"center",borderTop:`2px solid ${s==="REST"?"#1E1E1E":col}`}}>
                <div className="bb" style={{fontSize:9,color:s==="REST"?"#4B5563":col}}>{d}</div>
                <div style={{fontSize:6,color:"#4B5563",margin:"1px 0"}}>{s}</div>
                <div className="bb" style={{fontSize:11,color:"#F1F5F9"}}>{c}</div>
              </div>
            ))}
          </div>
          <div style={{fontSize:8,color:"#4B5563",marginTop:3,lineHeight:1.5}}>{note}</div>
        </div>
      ))}
      <div style={{fontSize:9,color:"#6B7280",lineHeight:1.8,marginTop:6}}>
        <span style={{color:"#22D3EE"}}>Indian diet:</span> Dal+rice=complete protein+slow carbs. Chicken, paneer, eggs, curd. Curd before bed=casein.<br/>
        <span style={{color:"#22D3EE"}}>Creatine:</span> 5g/day every day. Non-negotiable in a deficit.<br/>
        <span style={{color:"#22D3EE"}}>Sleep:</span> 7.5–9hrs. Most anabolic tool you have as an engineering student.
      </div>
    </div>

    {/* HONEST EXPECTATIONS */}
    <div style={{background:"#0E0E0E",border:"1px solid #1A1A1A",borderRadius:12,padding:"14px",marginBottom:10}}>
      <div style={{fontSize:9,letterSpacing:2,color:"#4B5563",marginBottom:8}}>HONEST EXPECTATIONS</div>
      <div style={{background:"rgba(249,115,22,0.07)",border:"1px solid rgba(249,115,22,0.2)",borderRadius:8,padding:"10px 12px",marginBottom:10}}>
        <div style={{fontSize:8,color:"#F97316",marginBottom:5}}>⚠️ JULY 4 — THE REAL MATHS</div>
        <div style={{fontSize:9,color:"#E5E7EB",lineHeight:1.8}}>
          <span style={{color:"#F97316"}}>Target:</span> 88kg/20%→~80kg/12% in 15 weeks.<br/>
          <span style={{color:"#F97316"}}>Fat to lose:</span> ~8kg. At 0.5kg/wk=7.5kg. At 0.6kg/wk=9kg. <span style={{color:"#4ADE80"}}>✓ Achievable — zero room for consistent off-weeks.</span><br/>
          <span style={{color:"#F97316"}}>Indian body type:</span> Central fat goes last. Arms/shoulders lean first (wk 6–10), abs at 13–14% (wk 10–14), Christmas tree at 12% (July).
        </div>
      </div>
      <div style={{fontSize:9,color:"#6B7280",lineHeight:1.9}}>
        <span style={{color:"#F1F5F9",fontWeight:600}}>Wk 1–5:</span> Scale drops 2–3kg. Bench past 110kg. Shoulder definition starts.<br/>
        <span style={{color:"#F1F5F9",fontWeight:600}}>Wk 6–10:</span> Lats widen visibly. Face leans out. Deadlift 230kg+. People notice.<br/>
        <span style={{color:"#F1F5F9",fontWeight:600}}>Wk 11–15:</span> Abs at 13–14%, clearly visible at 12%. Demon back + boulder shoulders. Bench 120kg+.<br/>
        <span style={{color:"#F1F5F9",fontWeight:600}}>Wk 16–20:</span> 10% BF. Bench 130–140kg, deadlift 240–250kg, squat 185–200kg.<br/>
        <span style={{color:"#F43F5E",fontWeight:600}}>What kills July goal:</span> Weekend overeating, skipping zone 2, underestimating calories.
      </div>
    </div>

  </div>;
}

function ProgramPage(){
  const [day,setDay] = useState(0);
  const [week,setWeek] = useState(0);
  const d = DAYS[day];
  const wm = WM[week];

  return <div style={{padding:"14px 12px",maxWidth:560,margin:"0 auto"}}>

    {/* WEEK SELECTOR */}
    <div style={{marginBottom:14}}>
      <div style={{fontSize:8,letterSpacing:2,color:"#4B5563",marginBottom:6}}>SELECT WEEK</div>
      <div style={{display:"flex",gap:5}}>
        {WM.map((wk,i)=>{
          const active=week===i;
          return <button key={i} onClick={()=>setWeek(i)} style={{
            flex:1,padding:"8px 2px",border:"none",borderRadius:7,
            background:active?wk.c:"#111",color:active?"#000":"#555",
            borderTop:`3px solid ${active?wk.c:"#222"}`,
            display:"flex",flexDirection:"column",alignItems:"center",gap:1,
          }}>
            <span className="bb" style={{fontSize:18}}>{`W${i+1}`}</span>
            <span style={{fontSize:6,letterSpacing:0.5}}>{wk.label}</span>
          </button>;
        })}
      </div>
      <div style={{marginTop:6,background:"#0E0E0E",border:"1px solid #1A1A1A",borderRadius:7,padding:"8px 12px",display:"flex",gap:12,flexWrap:"wrap"}}>
        {[["FOCUS",wm.label],["RPE",wm.rpe],["SCHEME",wm.scheme],["VOLUME",wm.vol]].map(([l,v])=>(
          <div key={l}>
            <div style={{fontSize:7,color:"#4B5563"}}>{l}</div>
            <div className="bb" style={{fontSize:14,color:wm.c,letterSpacing:1}}>{v}</div>
          </div>
        ))}
      </div>
    </div>

    {/* DAY TABS */}
    <div style={{display:"flex",gap:5,marginBottom:12,overflowX:"auto",paddingBottom:2}}>
      {DAYS.map((dd,i)=>{
        const active=day===i;
        return <button key={i} onClick={()=>setDay(i)} style={{
          padding:"7px 10px",border:`1px solid ${active?"#F97316":"#1E1E1E"}`,
          borderRadius:7,background:active?"rgba(249,115,22,0.1)":"#0E0E0E",
          color:active?"#F97316":"#6B7280",whiteSpace:"nowrap",flexShrink:0,
        }}>
          <span className="bb" style={{fontSize:12,letterSpacing:1}}>D{dd.id}·{dd.name}</span>
        </button>;
      })}
    </div>

    {/* DAY HEADER */}
    <div style={{background:"linear-gradient(135deg,#111,#161616)",border:"1px solid #1E1E1E",borderRadius:11,padding:"14px",marginBottom:8}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:6,marginBottom:d.goals?10:0}}>
        <div>
          <div className="bb" style={{fontSize:22,letterSpacing:2,color:"#F1F5F9",lineHeight:1}}>DAY {d.id}: {d.name}</div>
          <div style={{fontSize:10,color:"#9CA3AF",marginTop:3}}>{d.sub}</div>
        </div>
        <div style={{padding:"3px 8px",background:"#1A1A1A",border:"1px solid #2A2A2A",borderRadius:20,fontSize:7,letterSpacing:1,color:"#F97316",flexShrink:0}}>{d.tag}</div>
      </div>
      {d.muscles&&<div style={{fontSize:8,color:"#4B5563",marginBottom:6}}><span style={{color:"#2A2A2A"}}>MUSCLES: </span>{d.muscles}</div>}
      {d.goals&&<div style={{display:"flex",flexWrap:"wrap",gap:4}}>
        {d.goals.map((g,i)=>(
          <span key={i} style={{padding:"2px 8px",background:"rgba(249,115,22,0.08)",border:"1px solid rgba(249,115,22,0.2)",borderRadius:99,fontSize:8,color:"#F97316"}}>✓ {g}</span>
        ))}
      </div>}
    </div>

    {/* EXERCISES */}
    <div style={{display:"flex",flexDirection:"column",gap:7}}>
      {d.ex.map((ex,idx)=>{
        const wd=ex.w[week];
        const tm=TM[ex.t];
        return <div key={idx} style={{background:"#0E0E0E",border:"1px solid #1A1A1A",borderRadius:9,padding:"12px 13px",display:"grid",gridTemplateColumns:"1fr auto",alignItems:"start",gap:10}}>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4,flexWrap:"wrap"}}>
              <Chip bg={tm.bg} fg={tm.fg}>{tm.label}</Chip>
              <span style={{fontWeight:600,fontSize:13,color:"#F1F5F9"}}>{ex.n}</span>
            </div>
            <div style={{fontSize:10,color:"#6B7280",lineHeight:1.6}}>{wd.note}</div>
          </div>
          <div style={{textAlign:"center",minWidth:64}}>
            <div style={{background:"#161616",border:"1px solid #252525",borderRadius:7,padding:"7px 8px"}}>
              <div className="bb" style={{fontSize:17,color:wm.c,letterSpacing:1,lineHeight:1}}>{wd.s}×{wd.r}</div>
              <div style={{fontSize:7,color:"#4B5563",letterSpacing:1,marginTop:1}}>SETS×REPS</div>
            </div>
          </div>
        </div>;
      })}
    </div>

    {/* LEGEND + BLOCK LOGIC */}
    <div style={{marginTop:12,display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
      <div style={{background:"#0E0E0E",border:"1px solid #1A1A1A",borderRadius:10,padding:"12px"}}>
        <div style={{fontSize:8,letterSpacing:2,color:"#4B5563",marginBottom:7}}>LEGEND</div>
        {Object.entries(TM).map(([k,v])=>(
          <div key={k} style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
            <div style={{width:6,height:6,borderRadius:2,background:v.bg,flexShrink:0}}/>
            <span style={{fontSize:9,color:"#6B7280"}}>{v.label}</span>
          </div>
        ))}
      </div>
      <div style={{background:"#0E0E0E",border:"1px solid #1A1A1A",borderRadius:10,padding:"12px"}}>
        <div style={{fontSize:8,letterSpacing:2,color:"#4B5563",marginBottom:7}}>BLOCK LOGIC</div>
        <div style={{fontSize:9,color:"#6B7280",lineHeight:1.9}}>
          W1→W2: +2.5kg upper/+5kg lower<br/>
          W3: Same W2 loads, fewer sets<br/>
          W4: Drop to 60% — flush<br/>
          W5: Pyramid to new 1RM<br/>
          After W5: Reset, run heavier
        </div>
      </div>
    </div>

    {/* SCHEDULE */}
    <div style={{background:"#0E0E0E",border:"1px solid #1A1A1A",borderRadius:10,padding:"12px",marginTop:8}}>
      <div style={{fontSize:8,letterSpacing:2,color:"#4B5563",marginBottom:7}}>WEEKLY SCHEDULE</div>
      <div style={{display:"flex",gap:4}}>
        {[["MON","D1 PUSH"],["TUE","D2 PULL"],["WED","D3 LEGS"],["THU","REST"],["FRI","D4 SKILLS"],["SAT","D5 BACK"],["SUN","REST"]].map(([dy,s])=>(
          <div key={dy} style={{flex:1,textAlign:"center",padding:"6px 2px",background:"#141414",borderRadius:5,border:"1px solid #1E1E1E"}}>
            <div className="bb" style={{fontSize:10,color:"#F97316",letterSpacing:1}}>{dy}</div>
            <div style={{fontSize:6,color:"#6B7280",marginTop:1}}>{s}</div>
          </div>
        ))}
      </div>
    </div>

  </div>;
}

function App(){
  const [tab,setTab] = useState("profile");
  return <div style={{fontFamily:"'Space Grotesk',sans-serif",background:"#080808",minHeight:"100vh",color:"#E5E7EB"}}>
    <div style={{background:"#0C0C0C",borderBottom:"1px solid #1A1A1A",padding:"0 14px",position:"sticky",top:0,zIndex:100}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingTop:12,paddingBottom:8}}>
        <div>
          <div className="bb" style={{fontSize:30,letterSpacing:4,color:"#F97316",lineHeight:1}}>IRONFORM</div>
          <div style={{fontSize:7,letterSpacing:2,color:"#4B5563",marginTop:1}}>AESTHETICS · POWERLIFTING · STREETLIFTING · CALISTHENICS</div>
        </div>
      </div>
      <div style={{display:"flex",borderTop:"1px solid #1A1A1A"}}>
        {[["profile","🎯 PROFILE & GOALS"],["program","📋 PROGRAM"]].map(([t,label])=>(
          <button key={t} onClick={()=>setTab(t)} style={{
            padding:"9px 14px",background:"none",border:"none",
            borderBottom:tab===t?"2px solid #F97316":"2px solid transparent",
            color:tab===t?"#F97316":"#4B5563",fontSize:11,letterSpacing:1,marginBottom:-1,
          }}>
            <span className="bb" style={{letterSpacing:1}}>{label}</span>
          </button>
        ))}
      </div>
    </div>
    {tab==="profile"&&<ProfilePage/>}
    {tab==="program"&&<ProgramPage/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
